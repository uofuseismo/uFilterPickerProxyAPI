edition = "2023";
import "google/protobuf/duration.proto";

package UFilterPickerProxyAPI.V1;

/*!
 * Requests picks from the proxy.
 */
message SubscriptionRequest {
    string identifier = 1 [default = ""]; /// A request identifier.
    google.protobuf.Duration backfill_duration = 2 [default = 0]; /// If the consumer or proxy drops out this allows for a pick backfill operation.
}
